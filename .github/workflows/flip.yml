name: Bazaar Flip Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: bazaar-flip-alerts
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Verify webhook secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -c "import os; value = os.environ['DISCORD_WEBHOOK_URL'].strip(); assert value, 'DISCORD_WEBHOOK_URL secret is missing or empty'"

      - name: Post flips
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -u bot/webhook_post.py
