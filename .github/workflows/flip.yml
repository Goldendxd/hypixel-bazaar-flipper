name: Bazaar Flip Alerts

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

concurrency:
  group: bazaar-flip-alerts
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r bot/requirements.txt

      - name: Post flips
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SINGLE_RUN: '1'
        run: python -u bot/webhook_post.py
