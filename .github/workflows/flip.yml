name: Bazaar Flip Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: bot/requirements.txt

      - run: pip install requests

      # Run twice with ~2.5 min gap to approximate 2-3 min cadence
      - name: Post flips (run 1)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot/webhook_post.py

      - name: Wait 2.5 minutes
        run: sleep 150

      - name: Post flips (run 2)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot/webhook_post.py
